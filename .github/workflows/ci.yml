name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    # Runs on all three platforms to verify cross-platform compatibility.
    # Unit and integration tests are Node-only (no Obsidian binary required).
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run JSDOM unit tests
        run: npm run test-unit

  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    # Runs on all three platforms to verify cross-platform compatibility.
    # Integration tests spawn real Node subprocesses; no Obsidian binary required.
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test-integration

  e2e-tests-linux:
    name: E2E Tests (Linux)
    # Linux: extract Obsidian's AppImage and run under a virtual framebuffer (xvfb).
    # Windows E2E is a known gap — see SPRINT-010 Known Gaps for the path forward.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Electron system dependencies
        run: npx playwright install-deps chromium

      - name: Download and extract Obsidian
        run: |
          OBSIDIAN_TAG=$(curl -s "https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest" \
            | jq -r '.tag_name')
          OBSIDIAN_VERSION="${OBSIDIAN_TAG#v}"
          curl -L \
            "https://github.com/obsidianmd/obsidian-releases/releases/download/${OBSIDIAN_TAG}/Obsidian-${OBSIDIAN_VERSION}.AppImage" \
            -o /tmp/Obsidian.AppImage
          chmod +x /tmp/Obsidian.AppImage
          cd /tmp && ./Obsidian.AppImage --appimage-extract > /dev/null
          # Point directly to the Obsidian binary, not AppRun: AppRun contains a
          # hardcoded path /obsidian that only works under a FUSE mount, not when
          # extracted. The binary uses RPATH=$ORIGIN so it finds bundled libs
          # in the same directory without any LD_LIBRARY_PATH setup needed.
          echo "OBSIDIAN_BINARY=/tmp/squashfs-root/obsidian" >> "$GITHUB_ENV"

      - name: Build plugin
        run: npm run build

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test-e2e

  e2e-tests-macos:
    name: E2E Tests (macOS)
    # macOS: download the .dmg, mount it, copy Obsidian.app to /Applications, then
    # launch via `open -a` (the existing launchObsidianMacOS strategy). No xvfb
    # needed — macOS runners have a window server. No playwright install-deps needed
    # — Electron on macOS bundles its own libraries.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Download and install Obsidian
        run: |
          OBSIDIAN_TAG=$(curl -s "https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest" \
            | jq -r '.tag_name')
          OBSIDIAN_VERSION="${OBSIDIAN_TAG#v}"
          curl -L \
            "https://github.com/obsidianmd/obsidian-releases/releases/download/${OBSIDIAN_TAG}/Obsidian-${OBSIDIAN_VERSION}.dmg" \
            -o /tmp/Obsidian.dmg
          hdiutil attach /tmp/Obsidian.dmg -nobrowse -quiet -mountpoint /tmp/obsidian-mount
          cp -R /tmp/obsidian-mount/Obsidian.app /Applications/
          hdiutil detach /tmp/obsidian-mount -quiet
          # Remove quarantine so Gatekeeper doesn't block the downloaded app on first launch
          xattr -d com.apple.quarantine /Applications/Obsidian.app 2>/dev/null || true
          echo "OBSIDIAN_BINARY=/Applications/Obsidian.app/Contents/MacOS/Obsidian" >> "$GITHUB_ENV"

      - name: Build plugin
        run: npm run build

      - name: Run E2E tests
        run: npm run test-e2e
