name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    # Runs on all three platforms to verify cross-platform compatibility.
    # Unit and integration tests are Node-only (no Obsidian binary required).
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run JSDOM unit tests
        run: npm run test-unit

  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    # Runs on all three platforms to verify cross-platform compatibility.
    # Integration tests spawn real Node subprocesses; no Obsidian binary required.
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test-integration

  e2e-tests:
    name: E2E Tests
    # E2E tests require Obsidian's Linux AppImage and a virtual framebuffer (xvfb).
    # macOS E2E is not yet in CI: Obsidian ships as a .dmg on macOS (no AppImage),
    # so a download-and-extract step for the runner would need separate work.
    # Windows E2E is a known gap — see SPRINT-010 Known Gaps for the path forward.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Electron system dependencies
        run: npx playwright install-deps chromium

      - name: Download and extract Obsidian
        run: |
          OBSIDIAN_TAG=$(curl -s "https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest" \
            | jq -r '.tag_name')
          OBSIDIAN_VERSION="${OBSIDIAN_TAG#v}"
          curl -L \
            "https://github.com/obsidianmd/obsidian-releases/releases/download/${OBSIDIAN_TAG}/Obsidian-${OBSIDIAN_VERSION}.AppImage" \
            -o /tmp/Obsidian.AppImage
          chmod +x /tmp/Obsidian.AppImage
          cd /tmp && ./Obsidian.AppImage --appimage-extract > /dev/null
          echo "OBSIDIAN_BINARY=/tmp/squashfs-root/AppRun" >> "$GITHUB_ENV"

      - name: Build plugin
        run: npm run build

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test-e2e
