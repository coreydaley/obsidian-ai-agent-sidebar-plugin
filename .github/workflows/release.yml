name: Release

on:
  push:
    # Obsidian requires bare semver tags with no "v" prefix (e.g. 0.1.0, not v0.1.0).
    # The tag must exactly match the "version" field in manifest.json.
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Draft and pre-release must both be false for Obsidian to pick up the release.
          draft: false
          prerelease: false
          # The release name is the bare version tag (e.g. "0.1.0").
          name: ${{ github.ref_name }}
          # Upload the three files Obsidian requires for manual and auto-install.
          files: |
            main.js
            manifest.json
            styles.css
