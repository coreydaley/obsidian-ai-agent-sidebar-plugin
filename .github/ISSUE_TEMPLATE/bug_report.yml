name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check the [existing issues](https://github.com/coreydaley/obsidian-ai-agent-sidebar-plugin/issues) to avoid duplicates.

  - type: dropdown
    id: agent
    attributes:
      label: Agent
      description: Which agent were you using when the bug occurred?
      options:
        - Claude Code (CLI)
        - Claude (API)
        - OpenAI Codex (CLI)
        - OpenAI Codex (API)
        - Google Gemini (API)
        - GitHub Copilot (CLI)
        - Not agent-specific / general
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the sidebar
        2. Type "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "1.8.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Windows 11, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: debug-output
    attributes:
      label: Debug output (optional)
      description: Enable debug mode in settings and paste the relevant output here.
      render: text
